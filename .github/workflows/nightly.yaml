name: Nightly builds

on:
  schedule:
    - cron: '23 1 * * *'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

concurrency:
  group: nightly-reset
  cancel-in-progress: true

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - name: Update flake.lock
        uses: ./.github/actions/flake-update
        with:
          inputs: "nixpkgs lix lix-module"

  build:
    needs: update-flake
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    uses: ./.github/workflows/build-package-nightly.yaml
    secrets:
      cachix-token: '${{ secrets.CACHIX_AUTH_TOKEN }}'
    with:
      runner: ${{ matrix.runner }}
      package: default
      tag: ${{ matrix.runner == 'ubuntu-latest' }}
